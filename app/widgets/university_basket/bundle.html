<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Basket</title>
  <style>/* ChatGPT-inspired dark theme — grey + chalk */
:root {
  color-scheme: dark;

  --bg: #212121;
  --bg-elevated: #2f2f2f;
  --bg-input: #383838;
  --bg-hover: #3d3d3d;
  --bg-selected: #404040;

  --border: #4a4a4a;
  --border-subtle: #3a3a3a;

  --text: #ececec;
  --text-muted: #b4b4b4;
  --text-dim: #8e8e8e;

  --accent: #d1d1d1;
  --accent-strong: #f5f5f5;

  --success-bg: #2a332a;
  --success-text: #b8c9b8;
  --error-bg: #3a2a2a;
  --error-text: #d4a8a8;

  --radius: 12px;
  --radius-sm: 8px;
  --font: "Söhne", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 12px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 20px;
  max-width: 520px;
}

h1 {
  margin: 6px 0 14px;
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--accent-strong);
}

h2 {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--text-muted);
  margin: 0 0 8px;
}

.eyebrow {
  margin: 0;
  font-size: 0.6875rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.hint {
  margin-top: 8px;
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.4;
}

.btn {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.btn.primary {
  background: var(--accent-strong);
  color: #171717;
  border-color: var(--accent-strong);
}

.btn.primary:hover:not(:disabled) {
  background: #ffffff;
}

.btn.primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.btn.secondary {
  background: transparent;
  color: var(--text-muted);
}

.btn.secondary:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.text-input,
.select-input {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9375rem;
  outline: none;
  font-family: inherit;
  color: var(--text);
  background: var(--bg-input);
}

.text-input::placeholder {
  color: var(--text-dim);
}

.text-input:focus,
.select-input:focus {
  border-color: #6b6b6b;
  box-shadow: 0 0 0 1px #6b6b6b;
}

.status {
  margin-top: 14px;
  padding: 11px 13px;
  border-radius: var(--radius-sm);
  background: var(--success-bg);
  color: var(--success-text);
  font-size: 0.8125rem;
  border: 1px solid var(--border-subtle);
}

.status.error {
  background: var(--error-bg);
  color: var(--error-text);
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.6875rem;
  background: var(--bg-selected);
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
  margin-left: 8px;
}

.code {
  font-family: ui-monospace, "Cascadia Code", monospace;
  font-size: 1.125rem;
  letter-spacing: 0.08em;
  color: var(--accent-strong);
}

.overdue {
  color: #c9a0a0;
}

ul {
  padding-left: 18px;
  margin: 0;
  color: var(--text-muted);
}

section {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
}

section:first-of-type {
  border-top: none;
  padding-top: 0;
}


.basket-wrap {
  max-height: 520px;
  display: flex;
  flex-direction: column;
}

.basket-header h1 {
  font-size: 1rem;
  margin-bottom: 4px;
}

.header-score {
  font-size: 0.8125rem;
  color: var(--text-muted);
  margin: 0 0 12px;
}

.basket-scroll {
  overflow-y: auto;
  flex: 1;
  max-height: 420px;
  padding-right: 4px;
}

.sub-hint {
  margin-top: 12px;
  font-size: 0.75rem;
  color: var(--text-dim);
  text-align: center;
}

.category {
  margin-top: 18px;
}

.category h2 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.category h2 .count {
  opacity: 0.6;
  font-weight: normal;
}

.card-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.uni-card {
  background: var(--surface-2, rgba(255, 255, 255, 0.04));
  border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
  border-radius: 10px;
  padding: 10px 12px;
}

.uni-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.uni-info {
  flex: 1;
  min-width: 0;
}

.uni-header strong {
  font-size: 0.9375rem;
  display: block;
}

.badge {
  font-size: 0.6875rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(99, 102, 241, 0.2);
  color: #a5b4fc;
}

.uni-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 0.8125rem;
  color: var(--text-muted);
  margin-top: 6px;
}

.uni-meta.secondary {
  font-size: 0.75rem;
}

.tuition.under { color: #4ade80; }
.tuition.ok { color: #fbbf24; }
.tuition.over { color: #f87171; }

.match-bar {
  font-weight: 600;
  color: var(--accent, #818cf8);
}

.notify-btn {
  flex-shrink: 0;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(129, 140, 248, 0.4);
  background: rgba(99, 102, 241, 0.15);
  color: #c7d2fe;
  font-size: 0.8125rem;
  cursor: pointer;
  white-space: nowrap;
}

.notify-btn:hover:not(:disabled) {
  background: rgba(99, 102, 241, 0.3);
}

.notify-btn:disabled,
.notify-btn.notified {
  opacity: 0.85;
  cursor: default;
  border-color: rgba(74, 222, 128, 0.4);
  background: rgba(34, 197, 94, 0.12);
  color: #86efac;
}

.reach .uni-card { border-left: 3px solid #f87171; }
.target .uni-card { border-left: 3px solid #fbbf24; }
.safety .uni-card { border-left: 3px solid #4ade80; }

.empty {
  color: var(--text-dim);
  font-size: 0.875rem;
}

.country, .accept, .deadline {
  font-size: 0.75rem;
  color: var(--text-dim);
}
</style>
</head>
<body>
  <main class="card basket-wrap">
    <header class="basket-header">
      <h1>🎓 Your Top College Matches</h1>
      <p id="header-score" class="header-score" hidden></p>
    </header>
    <div id="basket" class="basket-scroll"></div>
    <p id="sub-hint" class="sub-hint"></p>
  </main>
  <script>const bridge = window.openai ?? {};
const data = bridge.toolOutput?.structuredContent ?? bridge.toolOutput ?? {};
const universities = data.universities ?? [];
const planId = data.plan_id ?? bridge.widgetState?.plan_id;
const subscribedIds = new Set(data.subscribed_university_ids ?? []);
const maxSubs = data.max_subscriptions ?? 10;
let subCount = data.subscription_count ?? subscribedIds.size;

const basket = document.getElementById("basket");
const headerScore = document.getElementById("header-score");
const subHint = document.getElementById("sub-hint");

const overall = data.candidate_score?.overall ?? data.profile?.candidate_score_json?.overall;
if (overall != null) {
  headerScore.textContent = `Based on your profile · Score: ${Math.round(overall)}/100`;
  headerScore.hidden = false;
}
subHint.textContent = `You can subscribe to up to ${maxSubs} colleges (${subCount}/${maxSubs} used)`;

basket.innerHTML = "";

const groups = { reach: [], target: [], safety: [] };
for (const uni of universities.slice(0, 10)) {
  const cat = (uni.category || "target").toLowerCase();
  (groups[cat] || groups.target).push(uni);
}

function budgetLight(tuition, profileBudget) {
  if (!tuition) return "";
  const budget = profileBudget || 50000;
  if (tuition <= budget * 0.8) return "under";
  if (tuition <= budget) return "ok";
  return "over";
}

async function onNotify(btn, uni) {
  if (!planId) {
    alert("Missing plan_id");
    return;
  }
  if (btn.disabled) return;

  const result = bridge.callTool
    ? await bridge.callTool("subscribe_college_notification", {
        plan_id: planId,
        university_id: uni.id,
      })
    : await fetch("/api/subscriptions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ plan_id: planId, university_id: uni.id }),
      }).then((r) => r.json());

  if (result?.status === "subscribed") {
    btn.textContent = "✅ Notified";
    btn.disabled = true;
    btn.classList.add("notified");
    subCount = result.subscribed_count ?? subCount + 1;
    subHint.textContent = `You can subscribe to up to ${maxSubs} colleges (${subCount}/${maxSubs} used)`;
    bridge.sendFollowUpMessage?.({
      prompt:
        `You've subscribed to ${uni.university_name} notifications! ` +
        `To receive updates on Telegram, click this link: ${result.telegram_invite_link} ` +
        `Then send your ESID (${result.esid}) to the bot.`,
    });
  } else if (result?.status === "limit_reached") {
    alert("You have reached the maximum of 10 college subscriptions.");
  } else if (result?.status === "already_subscribed") {
    btn.textContent = "✅ Notified";
    btn.disabled = true;
    btn.classList.add("notified");
  }
}

function renderCard(uni) {
  const card = document.createElement("div");
  card.className = "uni-card";
  const name = uni.university_name || "Unknown";
  const program = uni.program_name ? ` — ${uni.program_name}` : "";
  const rank = uni.qs_rank ? `QS #${uni.qs_rank}` : "";
  const tuition = uni.tuition_usd ? `$${Number(uni.tuition_usd).toLocaleString()}/yr` : "";
  const deadline = uni.deadline ? uni.deadline : "";
  const match = uni.match_score != null ? `Match: ${Math.round(uni.match_score)}%` : "";
  const accept = uni.acceptance_rate ? `Acceptance: ${uni.acceptance_rate}%` : "";
  const light = budgetLight(uni.tuition_usd, data.profile?.budget_usd);
  const isSubscribed = subscribedIds.has(uni.id);

  const row = document.createElement("div");
  row.className = "uni-row";

  const info = document.createElement("div");
  info.className = "uni-info";
  info.innerHTML = `
    <div class="uni-header">
      <strong>${name}${program}</strong>
    </div>
    <div class="uni-meta">
      ${rank ? `<span class="badge">${rank}</span>` : ""}
      ${tuition ? `<span class="tuition ${light}">${tuition}</span>` : ""}
      ${deadline ? `<span class="deadline">${deadline}</span>` : ""}
    </div>
    <div class="uni-meta secondary">
      ${match ? `<span class="match-bar">${match}</span>` : ""}
      ${accept ? `<span class="accept">${accept}</span>` : ""}
    </div>
  `;

  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "notify-btn";
  btn.dataset.uniId = uni.id;
  btn.dataset.uniName = name;
  if (isSubscribed) {
    btn.textContent = "✅ Notified";
    btn.disabled = true;
    btn.classList.add("notified");
  } else {
    btn.textContent = "🔔 Notify";
    btn.onclick = () => onNotify(btn, uni);
  }

  row.appendChild(info);
  row.appendChild(btn);
  card.appendChild(row);
  return card;
}

for (const [category, items] of Object.entries(groups)) {
  if (!items.length) continue;
  const section = document.createElement("div");
  section.className = `category ${category}`;
  section.innerHTML = `<h2>${category.toUpperCase()} <span class="count">(${items.length})</span></h2>`;
  const grid = document.createElement("div");
  grid.className = "card-grid";
  for (const uni of items) grid.appendChild(renderCard(uni));
  section.appendChild(grid);
  basket.appendChild(section);
}

if (!universities.length) {
  basket.innerHTML =
    '<p class="empty">No universities in your shortlist yet. Ask the agent to run search_universities.</p>';
}
</script>
</body>
</html>
