<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 3 — Experience & Preferences</title>
  <style>/* ChatGPT-inspired dark theme — grey + chalk */
:root {
  color-scheme: dark;

  --bg: #212121;
  --bg-elevated: #2f2f2f;
  --bg-input: #383838;
  --bg-hover: #3d3d3d;
  --bg-selected: #404040;

  --border: #4a4a4a;
  --border-subtle: #3a3a3a;

  --text: #ececec;
  --text-muted: #b4b4b4;
  --text-dim: #8e8e8e;

  --accent: #d1d1d1;
  --accent-strong: #f5f5f5;

  --success-bg: #2a332a;
  --success-text: #b8c9b8;
  --error-bg: #3a2a2a;
  --error-text: #d4a8a8;

  --radius: 12px;
  --radius-sm: 8px;
  --font: "Söhne", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 12px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 20px;
  max-width: 520px;
}

h1 {
  margin: 6px 0 14px;
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--accent-strong);
}

h2 {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--text-muted);
  margin: 0 0 8px;
}

.eyebrow {
  margin: 0;
  font-size: 0.6875rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.hint {
  margin-top: 8px;
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.4;
}

.btn {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.btn.primary {
  background: var(--accent-strong);
  color: #171717;
  border-color: var(--accent-strong);
}

.btn.primary:hover:not(:disabled) {
  background: #ffffff;
}

.btn.primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.btn.secondary {
  background: transparent;
  color: var(--text-muted);
}

.btn.secondary:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.text-input,
.select-input {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9375rem;
  outline: none;
  font-family: inherit;
  color: var(--text);
  background: var(--bg-input);
}

.text-input::placeholder {
  color: var(--text-dim);
}

.text-input:focus,
.select-input:focus {
  border-color: #6b6b6b;
  box-shadow: 0 0 0 1px #6b6b6b;
}

.status {
  margin-top: 14px;
  padding: 11px 13px;
  border-radius: var(--radius-sm);
  background: var(--success-bg);
  color: var(--success-text);
  font-size: 0.8125rem;
  border: 1px solid var(--border-subtle);
}

.status.error {
  background: var(--error-bg);
  color: var(--error-text);
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.6875rem;
  background: var(--bg-selected);
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
  margin-left: 8px;
}

.code {
  font-family: ui-monospace, "Cascadia Code", monospace;
  font-size: 1.125rem;
  letter-spacing: 0.08em;
  color: var(--accent-strong);
}

.overdue {
  color: #c9a0a0;
}

ul {
  padding-left: 18px;
  margin: 0;
  color: var(--text-muted);
}

section {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
}

section:first-of-type {
  border-top: none;
  padding-top: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

.stage-card {
  max-height: min(480px, 72vh);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}

.stage-card > .header {
  flex-shrink: 0;
  padding: 16px 16px 0;
}

.form-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 8px 16px;
  touch-action: pan-y;
}

.stage-card > .actions {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  margin: 0;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
}

.stage-card > .status {
  flex-shrink: 0;
  margin: 0 16px 12px;
}

.step-content label {
  display: block;
  margin: 10px 0;
  font-size: 0.875rem;
  color: var(--text-muted);
}

.text-input {
  width: 100%;
  margin-top: 4px;
}

.progress {
  height: 4px;
  background: var(--bg-input);
  border-radius: 999px;
  margin: 12px 0;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent-strong);
  border-radius: 999px;
}

.hint {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin: 8px 0;
}

.card { padding: 16px; }
.step-content label { display: block; margin: 10px 0; font-size: 0.875rem; }
.text-input { width: 100%; margin-top: 4px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); }
.btn.primary { background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
.progress { height: 4px; background: var(--border); border-radius: 4px; margin: 12px 0; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 4px; }
</style>
</head>
<body>
  <main class="card stage-card">
    <header class="header"><p class="eyebrow">Stage 3 of 3</p><h1>Experience & preferences</h1>
    <div class="progress"><div class="progress-bar" style="width:100%"></div></div></header>
    <div class="form-scroll">
      <form id="form" class="step-content">
        <label>Full-time work months<input name="full_time_months" type="number" class="text-input" value="0" /></label>
        <label>Internship months<input name="internship_months" type="number" class="text-input" value="0" /></label>
        <label>Has research papers?<select name="has_papers" class="text-input"><option value="false">No</option><option value="true">Yes</option></select></label>
        <label>Conference tier<select name="conference_tier" class="text-input"><option value="na">N/A</option><option>A*</option><option>A</option><option>B</option><option>C</option></select></label>
        <label>Leadership roles?<select name="leadership_roles" class="text-input"><option value="false">No</option><option value="true">Yes</option></select></label>
        <label>Campus type<select name="campus_type" class="text-input"><option value="urban">Urban</option><option value="suburban">Suburban</option><option value="rural">Rural</option><option value="no_preference">No preference</option></select></label>
        <label>Post-study goal<input name="post_study_goal" class="text-input" /></label>
        <label>Visa constraints<input name="visa_constraints" class="text-input" /></label>
        <label><input type="checkbox" name="funding_open" /> Open to funded PhD programs</label>
      </form>
    </div>
    <footer class="actions"><button id="submit-btn" type="button" class="btn primary">Submit profile</button></footer>
    <p id="status" class="status" hidden></p>
  </main>
  <script>const bridge = window.openai ?? {};

function readPayload() {
  const output = bridge.toolOutput;
  if (!output) return {};
  if (output.structuredContent && typeof output.structuredContent === "object") return output.structuredContent;
  if (typeof output === "object" && !Array.isArray(output)) return output;
  return {};
}

function resolvePlanId() {
  const payload = readPayload();
  const state = bridge.widgetState ?? {};
  return state.plan_id ?? payload.plan_id ?? payload.profile?.plan_id ?? null;
}

function persistState(extra = {}) {
  bridge.setWidgetState?.({ ...(bridge.widgetState ?? {}), ...extra });
}

async function ensurePlan(region = "Europe") {
  let planId = resolvePlanId();
  if (planId) {
    persistState({ plan_id: planId });
    return planId;
  }
  let data = null;
  if (bridge.callTool) {
    data = await bridge.callTool("start_planning_widget", { region });
    data = data?.structuredContent ?? data;
  }
  if (!data?.plan_id) {
    const res = await fetch("/api/onboarding/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ region }),
    });
    if (!res.ok) throw new Error("Could not create plan");
    data = await res.json();
  }
  planId = data.plan_id;
  persistState({ plan_id: planId });
  return planId;
}

async function loadSavedProfile(planId) {
  const payload = readPayload();
  if (payload.profile && Object.keys(payload.profile).length) return payload.profile;
  try {
    const res = await fetch(`/api/onboarding/profile/${planId}`);
    if (res.ok) {
      const data = await res.json();
      return data.profile ?? {};
    }
  } catch {
    /* offline / same-origin blocked */
  }
  return {};
}

function setStatus(message, isError = false) {
  const el = document.getElementById("status");
  if (!el) return;
  el.hidden = !message;
  el.textContent = message || "";
  el.classList.toggle("error", isError);
}

function setField(form, name, value) {
  if (value === undefined || value === null || value === "") return;
  const field = form.elements.namedItem(name);
  if (!field) return;
  if (field.type === "checkbox") field.checked = !!value;
  else if (Array.isArray(value)) field.value = value.join(", ");
  else field.value = String(value);
}

async function postJson(path, payload) {
  const res = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.detail || data.message || data.error || `Request failed (${res.status})`;
    throw new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
  }
  return data;
}

async function submitStage({ stage, payload, nextTool, nextMessage, buttonLabel = "Submit" }) {
  const btn = document.getElementById("submit-btn");
  if (!btn) throw new Error("Missing submit button");
  const defaultLabel = btn.dataset.defaultLabel || btn.textContent;
  btn.dataset.defaultLabel = defaultLabel;
  btn.disabled = true;
  btn.textContent = "Saving…";
  setStatus("Saving…", false);

  try {
    const planId = await ensurePlan();
    payload.plan_id = planId;
    const result = await postJson(`/api/onboarding/stage${stage}`, payload);
    persistState({ plan_id: planId, stage_complete: stage });

    if (bridge.callTool) {
      await bridge.callTool("save_onboarding_stage", { plan_id: planId, stage, data: payload }).catch(() => {});
    }

    setStatus(`Stage ${stage} saved.`, false);
    btn.textContent = "Saved ✓";

    if (nextTool && bridge.callTool) {
      await bridge.callTool(nextTool, { plan_id: planId });
    }
    if (nextMessage) {
      bridge.sendFollowUpMessage?.({ prompt: nextMessage });
    }
    return result;
  } catch (err) {
    setStatus(err.message || "Save failed", true);
    btn.disabled = false;
    btn.textContent = defaultLabel;
    throw err;
  }
}

function collectStage3(form) {
  const fd = new FormData(form);
  return {
    work: {
      jobs: [{ months: Number(fd.get("full_time_months")) || 0 }],
      internships: [{ months: Number(fd.get("internship_months")) || 0 }],
    },
    research: {
      has_papers: fd.get("has_papers") === "true",
      conference_tier: fd.get("conference_tier"),
    },
    extracurriculars: { leadership_roles: fd.get("leadership_roles") === "true" },
    campus_type: fd.get("campus_type"),
    post_study_goal: fd.get("post_study_goal"),
    visa_constraints: fd.get("visa_constraints"),
    funding_open: !!fd.get("funding_open"),
  };
}

function prefillStage3(form, profile) {
  const work = profile.work || {};
  const jobs = work.jobs || [];
  const internships = work.internships || [];
  setField(form, "full_time_months", jobs[0]?.months ?? 0);
  setField(form, "internship_months", internships[0]?.months ?? 0);
  const research = profile.research || {};
  setField(form, "has_papers", research.has_papers ? "true" : "false");
  setField(form, "conference_tier", research.conference_tier);
  const extra = profile.extracurriculars || {};
  setField(form, "leadership_roles", extra.leadership_roles ? "true" : "false");
  setField(form, "campus_type", profile.campus_type);
  setField(form, "post_study_goal", profile.post_study_goal);
  setField(form, "visa_constraints", profile.visa_constraints);
  if (profile.funding_open) setField(form, "funding_open", true);
}

async function initStage3() {
  const form = document.getElementById("form");
  const payload = readPayload();
  const planId = await ensurePlan();
  const profile = await loadSavedProfile(planId);
  prefillStage3(form, profile);
  const esid = payload.esid ?? "";

  document.getElementById("submit-btn").onclick = async () => {
    const btn = document.getElementById("submit-btn");
    const stage3 = collectStage3(form);
    btn.disabled = true;
    btn.textContent = "Saving…";
    setStatus("Saving profile…", false);

    try {
      await postJson(`/api/onboarding/stage3`, { plan_id: planId, ...stage3 });
      if (bridge.callTool) {
        await bridge.callTool("save_onboarding_stage", { plan_id: planId, stage: 3, data: stage3 }).catch(() => {});
      }
      const result = await postJson("/api/onboarding/submit_all", {
        plan_id: planId,
        esid,
        stage3,
        email: payload.email,
      });

      setStatus(`Profile complete (${result.profile_completeness}%).`, false);
      btn.textContent = "Saved ✓";
      bridge.sendFollowUpMessage?.({
        prompt: `Profile complete! (${result.profile_completeness}% complete). Your ESID is ${result.esid}. Now find my best college matches.`,
      });
      if (bridge.callTool) {
        await bridge.callTool("search_universities", { plan_id: planId });
      }
    } catch (err) {
      setStatus(err.message || "Submit failed", true);
      btn.disabled = false;
      btn.textContent = "Submit profile";
    }
  };
}

initStage3().catch((err) => setStatus(err.message, true));
</script>
</body>
</html>
