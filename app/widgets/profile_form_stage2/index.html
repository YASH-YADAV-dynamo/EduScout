<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 2 — Exams & Documents</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card stage-card">
    <header class="header"><p class="eyebrow">Stage 2 of 3</p><h1>Exam scores & documents</h1>
    <div class="progress"><div class="progress-bar" style="width:66%"></div></div></header>
    <div class="form-scroll">
      <form id="form" class="step-content">
        <label>IELTS overall (or expected)<input name="ielts_overall" type="number" step="0.5" class="text-input" /></label>
        <label>IELTS expected (if not taken)<input name="ielts_expected" type="number" step="0.5" class="text-input" /></label>
        <label>TOEFL total<input name="toefl_total" type="number" class="text-input" /></label>
        <label>GRE taken?<select name="gre_taken" class="text-input"><option value="false">No</option><option value="true">Yes</option></select></label>
        <label>GRE Verbal<input name="gre_verbal" type="number" class="text-input" /></label>
        <label>GRE Quant<input name="gre_quant" type="number" class="text-input" /></label>
        <p class="hint">Upload Resume/Transcripts in ChatGPT chat — agent will call analyze_document.</p>
      </form>
    </div>
    <footer class="actions"><button id="submit-btn" type="button" class="btn primary">Submit Stage 2</button></footer>
    <p id="status" class="status" hidden></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
