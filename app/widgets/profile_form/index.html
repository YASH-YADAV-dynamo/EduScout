<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planning</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <header class="header">
      <p class="eyebrow">Study Abroad Planner</p>
      <h1 id="step-title">Let's build your plan</h1>
      <div class="progress">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="step-indicator" class="step-indicator"></p>
    </header>

    <section id="step-content" class="step-content"></section>

    <footer class="actions">
      <button id="back-btn" type="button" class="btn secondary" hidden>Back</button>
      <button id="next-btn" type="button" class="btn primary">Continue</button>
    </footer>

    <p id="status" class="status" hidden></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
